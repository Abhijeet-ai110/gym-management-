<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gym Management System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    /* Header */
    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Dashboard */
    .dashboard {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      margin: 10px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* Members Table */
    .members {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }

    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>

</head>
<body>

  <header>
    <h1>🏋️ Gym Management System</h1>
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Members</a>
      <a href="#">Trainers</a>
      <a href="#">Plans</a>
    </nav>
  </header>

  <section class="dashboard">
    <div class="card">
      <h2>150</h2>
      <p>Members</p>
    </div>
    <div class="card">
      <h2>10</h2>
      <p>Trainers</p>
    </div>
    <div class="card">
      <h2>$5000</h2>
      <p>Revenue</p>
    </div>
  </section>

  <section class="members">
    <h2>Members List</h2>
    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Plan</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>Ali Khan</td>
        <td>25</td>
        <td>Monthly</td>
        <td>Active</td>
      </tr>
      <tr>
        <td>Sara Ahmed</td>
        <td>30</td>
        <td>Yearly</td>
        <td>Active</td>
      </tr>
      <tr>
        <td>Usman Ali</td>
        <td>28</td>
        <td>Weekly</td>
        <td>Expired</td>
      </tr>
    </table>
  </section>

</body>
</html>
